syntax = "proto3";

option go_package = "meshbird/protocol";

message Envelope {
	oneof type {
		MessagePing ping = 1;
		MessagePacket packet = 2;
	}
}

message MessagePing {
	int64  Timestamp = 1;
	repeated string PublicAddrs = 2;
	string IP = 4;
}

message MessagePacket {
	bytes payload = 1;
}

message MessageMetricReport {
	int64 ID = 1;
	string Name = 2;
	string Value = 3;
}

message MessageMultiplexedTunnel {
    int64 ID = 1;
	int64 Channel = 2;
	int64 Index = 3;
	bytes Payload = 4;
}
